pre-commit:
  parallel: true
  commands:
    oxfmt:
      glob: "*.{tsx,ts,mts,cts,mjs,cjs,js,json,jsonc,md,yml,yaml}"
      run: pnpm fix:oxfmt {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase

    oxlint:
      glob: "*.{tsx,ts,mts,cts,js,jsx,mjs,cjs}"
      run: pnpm fix:oxlint {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase

    cspell:
      glob: "*.{tsx,ts,mts,cts,mjs,cjs,js,json,jsonc,md,yml,yaml}"
      run: pnpm cspell lint --no-must-find-files --gitignore --cache {staged_files}
      skip:
        - merge
        - rebase

    gitleaks:
      run: command -v gitleaks >/dev/null && gitleaks protect --staged --verbose || echo "gitleaks not found, skipping"
      skip:
        - merge
        - rebase
